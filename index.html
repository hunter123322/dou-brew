<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/img/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Duo Brew | Coffee & Milk Tea in the Philippines</title>
    <meta name="description" content="Duo Brew offers affordable coffee, milk tea, and refreshing beverages across the Philippines. Perfect for quick drinks, hangouts, and daily refreshment." />
    <meta name="keywords" content="Duo Brew, coffee shop Philippines, milk tea Philippines, affordable coffee, iced coffee, milk tea near me" />
    <link rel="canonical" href="https://yourdomain.com/duo-brew" />

    <!-- Open Graph -->
    <meta property="og:title" content="Duo Brew | Coffee & Milk Tea in the Philippines" />
    <meta property="og:description" content="Affordable coffee and milk tea drinks from Duo Brew. Discover refreshing beverages near you." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/duo-brew" />
    <meta property="og:image" content="https://yourdomain.com/img/logo.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Duo Brew | Coffee & Milk Tea in the Philippines" />
    <meta name="twitter:description" content="Affordable coffee and milk tea drinks from Duo Brew." />
    <meta name="twitter:image" content="https://yourdomain.com/img/logo.jpg" />

    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CafeOrCoffeeShop",
      "name": "Duo Brew",
      "image": "https://yourdomain.com/img/logo.jpg",
      "url": "https://yourdomain.com/duo-brew",
      "servesCuisine": ["Coffee", "Milk Tea", "Beverages"],
      "priceRange": "₱",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "PH"
      },
      "sameAs": [
        "https://www.facebook.com/",
        "https://www.instagram.com/"
      ]
    }
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
